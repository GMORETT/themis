# Themis — local dev stack (Phase 0: lean)
#
# Active services (sufficient for Phases 1–3):
#   - postgres : relational store for conversations, audit log, eval results
#   - redis    : cache layer (semantic cache lands in Phase 5)
#   - qdrant   : vector store (hybrid dense + sparse)
#
# Deferred services (see commented blocks at the bottom):
#   - ollama   : local LLM runtime, added in Phase 2 when baseline RAG wires in generation
#   - langfuse : LLM tracing / observability, added in Phase 7
#
# To start: `make up`  (or `docker compose up -d`)

services:
  postgres:
    image: postgres:16-alpine
    container_name: themis-postgres
    environment:
      POSTGRES_USER: themis
      POSTGRES_PASSWORD: themis
      POSTGRES_DB: themis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U themis"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: themis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: themis-qdrant
    ports:
      - "6333:6333"  # REST
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Deferred: uncomment when entering the corresponding phase.
  # ---------------------------------------------------------------------------
  # ollama:  # Phase 2 — local LLM runtime for dev
  #   image: ollama/ollama:latest
  #   container_name: themis-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #
  # langfuse:  # Phase 7 — LLM tracing / cost / eval tracking
  #   image: langfuse/langfuse:2
  #   container_name: themis-langfuse
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://themis:themis@postgres:5432/themis
  #     NEXTAUTH_SECRET: devsecret
  #     SALT: devsalt
  #     NEXTAUTH_URL: http://localhost:3000
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  # ollama_data:
